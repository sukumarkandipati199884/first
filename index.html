<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <nav>
                <ul>
                    <li class="active"><a href="#">Dashboard</a></li>
                    <li><a href="#">Students</a></li>
                    <li><a href="#">Analytics</a></li>
                    <li><a href="#">Settings</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header class="header">
                <h1>Dashboard</h1>
                <div class="user-profile">
                    <div class="avatar">JD</div>
                    <span>John Doe</span>
                </div>
            </header>
            <section class="kpi-cards">
                <div class="kpi-card">
                    <h2>Total Students</h2>
                    <p>1,234</p>
                </div>
                <div class="kpi-card">
                    <h2>New Enrollments</h2>
                    <p>56</p>
                </div>
                <div class="kpi-card">
                    <h2>Graduation Rate</h2>
                    <p>85%</p>
                </div>
            </section>
            <section class="analytics">
                <div class="chart">
                    <h2>Enrollment Trends</h2>
                    <canvas id="enrollmentChart"></canvas>
                </div>
            </section>
            <section class="student-records">
                <h2>Student Records</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Grade</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Alice Johnson</td>
                            <td>20</td>
                            <td>A</td>
                            <td>Active</td>
                        </tr>
                        <tr>
                            <td>Bob Smith</td>
                            <td>22</td>
                            <td>B</td>
                            <td>Inactive</td>
                        </tr>
                        <tr>
                            <td>Charlie Brown</td>
                            <td>21</td>
                            <td>A</td>
                            <td>Active</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
