<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BananaTube</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="banana-logo.png" alt="BananaTube Logo">
            <h1>BananaTube</h1>
        </div>
        <input type="text" placeholder="Search">
    </header>
    <main>
        <div class="video">
            <img src="thumbnail1.jpg" alt="Video Thumbnail">
            <div class="video-info">
                <h3>Video Title 1</h3>
                <p>Channel Name 1</p>
            </div>
        </div>
        <div class="video">
            <img src="thumbnail2.jpg" alt="Video Thumbnail">
            <div class="video-info">
                <h3>Video Title 2</h3>
                <p>Channel Name 2</p>
            </div>
        </div>
        <div class="video">
            <img src="thumbnail3.jpg" alt="Video Thumbnail">
            <div class="video-info">
                <h3>Video Title 3</h3>
                <p>Channel Name 3</p>
            </div>
        </div>
    </main>
</body>
</html>
